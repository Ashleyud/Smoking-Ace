<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Before & After Comparison</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.controls{
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#0078d7;
    color:white;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#005ea6;
}

.container{
    position:relative;
    width:90%;
    max-width:1000px;
    margin:auto;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.landscape{
    aspect-ratio:16/9;
}

.portrait{
    aspect-ratio:9/16;
    max-width:500px;
}

.before,
.after{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.before img,
.after img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.after{
    width:50%;
    overflow:hidden;
}

.slider-line{
    position:absolute;
    top:0;
    left:50%;
    width:4px;
    height:100%;
    background:white;
    transform:translateX(-50%);
    z-index:5;
}

.slider-button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    z-index:6;
    box-shadow:0 0 10px rgba(0,0,0,.25);
}

.range{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:ew-resize;
    z-index:10;
}

.labels{
    position:absolute;
    width:100%;
    top:10px;
    display:flex;
    justify-content:space-between;
    z-index:8;
    padding:0 15px;
}

.labels span{
    background:rgba(0,0,0,.5);
    color:white;
    padding:8px 12px;
    border-radius:20px;
}

.inputs{
    margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Before & After Comparison</h1>

<div class="inputs">
    <p>
        Before Photo:
        <input type="file" id="beforeUpload" accept="image/*">
    </p>

    <p>
        After Photo:
        <input type="file" id="afterUpload" accept="image/*">
    </p>

    <button onclick="setLandscape()">Landscape Template</button>

    <button onclick="setPortrait()">Portrait Template</button>
</div>

<div id="comparison" class="container landscape">

    <div class="before">
        <img id="beforeImg"
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200">
    </div>

tainer">
        <img id="afterImg"
        srcoto-1500530855697-b586d89ba3ee?w=1200
    </div>

    <div class="labels">
        <span>Before</span>
        <span>After</span>
    </div>

    <div class="slider-line" id="sliderLine"></div>
    <div class="slider-button" id="sliderButton">↔</div>

    <input
        type="range"
        min="0"
        max="100"
        value="50"
        id="slider"
        class="range">

</div>

<script>

const slider=document.getElementById('slider');
const afterContainer=document.getElementById('afterContainer');
const sliderLine=document.getElementById('sliderLine');
const sliderButton=document.getElementById('sliderButton');

slider.addEventListener('input',function(){

    let value=this.value+"%";

    afterContainer.style.width=value;
    sliderLine.style.left=value;
    sliderButton.style.left=value;

});

document.getElementById('beforeUpload')
.addEventListener('change',function(e){

    const file=e.target.files[0];

    if(file){

        document.getElementById('beforeImg').src=
        URL.createObjectURL(file);

    }

});

document.getElementById('afterUpload')
.addEventListener('change',function(e){

    const file=e.target.files[0];

    if(file){

        document.getElementById('afterImg').src=
        URL.createObjectURL(file);

    }

});

function setLandscape(){

    const container=document.getElementById('comparison');

    container.classList.remove('portrait');
    container.classList.add('landscape');

}

function setPortrait(){

    const container=document.getElementById('comparison');

    container.classList.remove('landscape');
    container.classList.add('portrait');

}

</script>

</body>
</html>
